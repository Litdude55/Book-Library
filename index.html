<!DOCTYPE html>
<html lang="en" class="h-full bg-zinc-950 text-zinc-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniShelf // Vault Matrix</title>
    <!-- Tailwind CSS for high-performance styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons for vector graphic controls -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Html5Qrcode Library for direct mobile camera scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="min-h-screen flex flex-col md:flex-row antialiased select-none">

    <!-- Left Utility Side-Dock Navigation -->
    <aside class="w-full md:w-64 border-b md:border-b-0 md:border-r border-zinc-900 bg-zinc-950 p-6 flex flex-row md:flex-col justify-between md:justify-start gap-6 shrink-0 z-10">
        <div>
            <div class="flex items-center gap-3 mb-0 md:mb-10">
                <div class="h-9 w-9 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="layers" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-bold text-lg tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white to-zinc-400">OMNISHELF</span>
            </div>
            
            <nav class="hidden md:flex flex-col gap-1 mt-4">
                <button onclick="switchView('all')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-zinc-900 text-white font-medium text-left transition cursor-pointer">
                    <i data-lucide="layout-grid" class="w-4 h-4"></i>
                    <span>All Artifacts</span>
                </button>
                <button onclick="triggerCSVExport()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-900/50 text-left transition cursor-pointer">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span>Export Ledger (CSV)</span>
                </button>
                <label class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-zinc-400 hover:text-white hover:bg-zinc-900/50 text-left transition cursor-pointer">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    <span>Import Backup</span>
                    <input type="file" id="csv-import" accept=".csv" class="hidden" onchange="handleCSVImport(event)">
                </label>
            </nav>
        </div>

        <div class="md:mt-auto text-xs text-zinc-600 font-mono hidden md:block">
            v1.0.0 // LOCAL ENGINE
        </div>
    </aside>

    <!-- Main Active Workspace Content Area -->
    <main class="flex-1 p-6 md:p-10 max-w-7xl w-full mx-auto overflow-y-auto">
        <header class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">Vault Matrix</h1>
                <p class="text-zinc-400 text-sm mt-1">Local cataloging engine and client index system.</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleScannerModal()" class="flex items-center gap-2 px-4 py-2.5 bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-zinc-200 font-semibold rounded-lg transition cursor-pointer">
                    <i data-lucide="scan-barcode" class="w-4 h-4"></i> Scan Barcode
                </button>
                <button onclick="openAddModal()" class="flex items-center gap-2 px-4 py-2.5 bg-zinc-100 hover:bg-zinc-200 text-zinc-950 font-semibold rounded-lg transition cursor-pointer">
                    <i data-lucide="plus" class="w-4 h-4 stroke-[3]"></i> Add Item
                </button>
            </div>
        </header>

        <!-- Metric Metric Counters Panel -->
        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="metrics-panel">
            <div class="p-5 bg-zinc-900 border border-zinc-800/80 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Total Items</p>
                    <p id="count-total" class="text-2xl font-bold mt-1 tracking-tight">0</p>
                </div>
                <div class="p-3 rounded-xl text-indigo-400 bg-indigo-500/10"><i data-lucide="database" class="w-5 h-5"></i></div>
            </div>
            <div class="p-5 bg-zinc-900 border border-zinc-800/80 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Books</p>
                    <p id="count-books" class="text-2xl font-bold mt-1 tracking-tight">0</p>
                </div>
                <div class="p-3 rounded-xl text-emerald-400 bg-emerald-500/10"><i data-lucide="book-open" class="w-5 h-5"></i></div>
            </div>
            <div class="p-5 bg-zinc-900 border border-zinc-800/80 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Media Units</p>
                    <p id="count-media" class="text-2xl font-bold mt-1 tracking-tight">0</p>
                </div>
                <div class="p-3 rounded-xl text-amber-400 bg-amber-500/10"><i data-lucide="clapperboard" class="w-5 h-5"></i></div>
            </div>
            <div class="p-5 bg-zinc-900 border border-zinc-800/80 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Wishlist</p>
                    <p id="count-wishlist" class="text-2xl font-bold mt-1 tracking-tight">0</p>
                </div>
                <div class="p-3 rounded-xl text-sky-400 bg-sky-500/10"><i data-lucide="star" class="w-5 h-5"></i></div>
            </div>
        </section>

        <!-- Filter Pipeline Control Block -->
        <section class="bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 w-full sm:max-w-md">
                <i data-lucide="search" class="w-4 h-4 text-zinc-500 absolute ml-3 pointer-events-none"></i>
                <input 
                    type="text" 
                    id="search-input"
                    oninput="renderItems()"
                    placeholder="Search by Title, Creator, Identifier, or Tag..." 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none focus:border-indigo-500 placeholder-zinc-600 transition"
                />
            </div>
            <div class="flex items-center gap-2 self-end sm:self-auto">
                <select id="filter-type" onchange="renderItems()" class="bg-zinc-950 border border-zinc-800 text-sm rounded-lg px-3 py-2 text-zinc-300 focus:outline-none focus:border-indigo-500 cursor-pointer">
                    <option value="ALL">All Formats</option>
                    <option value="BOOK">Books</option>
                    <option value="MOVIE">Movies</option>
                    <option value="MUSIC">Music</option>
                    <option value="GAME">Video Games</option>
                </select>
                <select id="filter-status" onchange="renderItems()" class="bg-zinc-950 border border-zinc-800 text-sm rounded-lg px-3 py-2 text-zinc-300 focus:outline-none focus:border-indigo-500 cursor-pointer">
                    <option value="ALL">All Statuses</option>
                    <option value="OWNED">Owned</option>
                    <option value="LOANED">Loaned</option>
                    <option value="WISHLIST">Wishlist</option>
                </select>
            </div>
        </section>

        <!-- Main Dynamic Presentation Canvas -->
        <section id="collection-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Dynamic elements load here safely via JavaScript loop -->
        </section>
    </main>

    <!-- Modals Section (Add/Edit Entry Frame) -->
    <div id="item-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-lg rounded-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <header class="p-6 border-b border-zinc-800 flex items-center justify-between">
                <h2 id="modal-title" class="text-xl font-bold tracking-tight">Index New Artifact</h2>
                <button onclick="closeAddModal()" class="text-zinc-500 hover:text-zinc-300 cursor-pointer"><i data-lucide="x" class="w-5 h-5"></i></button>
            </header>
            <form id="item-form" onsubmit="saveItem(event)" class="p-6 space-y-4 overflow-y-auto flex-1">
                <input type="hidden" id="item-id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Format Type</label>
                        <select id="item-type" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-indigo-500" required>
                            <option value="BOOK">Book</option>
                            <option value="MOVIE">Movie</option>
                            <option value="MUSIC">Music</option>
                            <option value="GAME">Video Game</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Status</label>
                        <select id="item-status" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-indigo-500" required>
                            <option value="OWNED">Owned</option>
                            <option value="LOANED">Loaned</option>
                            <option value="WISHLIST">Wishlist</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Title</label>
                    <input type="text" id="item-title" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-indigo-500" required />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Creator / Author / Studio</label>
                    <input type="text" id="item-creator" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-indigo-500" required />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Identifier (ISBN/UPC/Barcode)</label>
                    <input type="text" id="item-identifier" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-indigo-500" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-1">Notes & Annotations</label>
                    <textarea id="item-notes" rows="3" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-200 focus:outline-none focus:border-indigo-500 resize-none"></textarea>
                </div>
                <footer class="pt-4 flex items-center justify-end gap-3">
                    <button type="button" onclick="closeAddModal()" class="px-4 py-2 border border-zinc-800 rounded-lg text-sm text-zinc-400 hover:text-white hover:bg-zinc-900 transition cursor-pointer">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-semibold transition cursor-pointer">Commit to Archive</button>
                </footer>
            </form>
        </div>
    </div>

    <!-- Scanner Camera Pipeline Modal Overlay -->
    <div id="scanner-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
        <div class="bg-zinc-900 border border-zinc-800 w-full max-w-md rounded-2xl p-6 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold tracking-tight">Camera Feed Pipeline</h2>
                <button onclick="toggleScannerModal()" class="text-zinc-500 hover:text-zinc-300 cursor-pointer"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="interactive-reader" class="w-full bg-zinc-950 rounded-xl overflow-hidden border border-zinc-800 aspect-video"></div>
            <p class="text-xs text-zinc-500 font-mono text-center">Center the hardware barcode within the target scope framework box.</p>
        </div>
    </div>

    <!-- Core Database Engine Application Scripting -->
    <script>
        let db;
        let html5QrcodeScanner;
        const request = indexedDB.open("OmniShelfEngine", 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("items")) {
                db.createObjectStore("items", { keyPath: "id" });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            lucide.createIcons();
            renderItems();
        };

        // UI Modal Layout Manipulation Operations
        function openAddModal() {
            document.getElementById('item-form').reset();
            document.getElementById('item-id').value = '';
            document.getElementById('modal-title').innerText = "Index New Artifact";
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function closeAddModal() {
            document.getElementById('item-modal').classList.add('hidden');
        }

        function toggleScannerModal() {
            const scannerModal = document.getElementById('scanner-modal');
            if (scannerModal.classList.contains('hidden')) {
                scannerModal.classList.remove('hidden');
                html5QrcodeScanner = new Html5Qrcode("interactive-reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 260, height: 160 } },
                    (decodedText) => {
                        toggleScannerModal();
                        openAddModal();
                        document.getElementById('item-identifier').value = decodedText;
                    },
                    () => {} // Mute runtime lookup failures
                ).catch(err => console.error("Hardware Camera Failure Matrix:", err));
            } else {
                scannerModal.classList.add('hidden');
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => html5QrcodeScanner = null).catch(() => {});
                }
            }
        }

        // Transaction Engine Pipelines
        function saveItem(e) {
            e.preventDefault();
            const id = document.getElementById('item-id').value || crypto.randomUUID();
            const item = {
                id,
                type: document.getElementById('item-type').value,
                status: document.getElementById('item-status').value,
                title: document.getElementById('item-title').value,
                creator: document.getElementById('item-creator').value,
                identifier: document.getElementById('item-identifier').value,
                notes: document.getElementById('item-notes').value,
                timestamp: Date.now()
            };

            const tx = db.transaction("items", "readwrite");
            tx.objectStore("items").put(item);
            tx.oncomplete = () => {
                closeAddModal();
                renderItems();
            };
        }

        function editItem(id) {
            const tx = db.transaction("items", "readonly");
            const store = tx.objectStore("items");
            const req = store.get(id);
            req.onsuccess = () => {
                const item = req.result;
                if (!item) return;
                openAddModal();
                document.getElementById('modal-title').innerText = "Modify Catalog Entry";
                document.getElementById('item-id').value = item.id;
                document.getElementById('item-type').value = item.type;
                document.getElementById('item-status').value = item.status;
                document.getElementById('item-title').value = item.title;
                document.getElementById('item-creator').value = item.creator;
                document.getElementById('item-identifier').value = item.identifier;
                document.getElementById('item-notes').value = item.notes;
            };
        }

        function deleteItem(id) {
            if (!confirm("Are you sure you want to remove this item from the local archive?")) return;
            const tx = db.transaction("items", "readwrite");
            tx.objectStore("items").delete(id);
            tx.oncomplete = () => renderItems();
        }

        // Rendering Engine Processing & Structural Parsing Loops
        function renderItems() {
            const tx = db.transaction("items", "readonly");
            const store = tx.objectStore("items");
            const req = store.getAll();

            req.onsuccess = () => {
                const items = req.result;
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const typeFilter = document.getElementById('filter-type').value;
                const statusFilter = document.getElementById('filter-status').value;
                const grid = document.getElementById('collection-grid');
                
                grid.innerHTML = '';
                let counts = { total: 0, books: 0, media: 0, wishlist: 0 };

                items.forEach(item => {
                    counts.total++;
                    if (item.type === 'BOOK') counts.books++;
                    if (item.type === 'MOVIE' || item.type === 'MUSIC' || item.type === 'GAME') counts.media++;
                    if (item.status === 'WISHLIST') counts.wishlist++;

                    // Query filter validation checks
                    if (typeFilter !== 'ALL' && item.type !== typeFilter) return;
                    if (statusFilter !== 'ALL' && item.status !== statusFilter) return;
                    if (searchTerm && !(
                        item.title.toLowerCase().includes(searchTerm) ||
                        item.creator.toLowerCase().includes(searchTerm) ||
                        (item.identifier && item.identifier.includes(searchTerm))
                    )) return;

                    const card = document.createElement('div');
                    card.className = "group relative bg-zinc-900 border border-zinc-800/60 rounded-xl overflow-hidden hover:border-zinc-700 transition flex flex-col justify-between";
                    card.innerHTML = `
                        <div class="aspect-[4/3] bg-zinc-950 w-full relative flex items-center justify-center text-zinc-800 border-b border-zinc-800/40">
                            <i data-lucide="${getIconName(item.type)}" class="w-12 h-12 stroke-[1] text-zinc-700"></i>
                            <span class="absolute top-3 right-3 text-[10px] uppercase font-bold px-2 py-1 rounded bg-zinc-900/80 tracking-wide border border-zinc-800 text-zinc-400">${item.type}</span>
                        </div>
                        <div class="p-4 flex-1">
                            <h3 class="font-bold text-sm tracking-wide text-zinc-200 line-clamp-1">${escapeHtml(item.title)}</h3>
                            <p class="text-xs text-zinc-500 mt-0.5">${escapeHtml(item.creator)}</p>
                            ${item.identifier ? `<div class="mt-2 text-[10px] font-mono text-zinc-600">ID: ${escapeHtml(item.identifier)}</div>` : ''}
                            ${item.notes ? `<p class="text-xs text-zinc-400 border-t border-zinc-800/50 mt-3 pt-2 line-clamp-2 italic">"${escapeHtml(item.notes)}"</p>` : ''}
                        </div>
                        <div class="p-4 border-t border-zinc-800/40 bg-zinc-900/20 flex items-center justify-between text-xs">
                            <span class="px-2 py-0.5 font-semibold rounded text-[11px] ${getStatusStyle(item.status)}">${item.status}</span>
                            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition">
                                <button onclick="editItem('${item.id}')" class="p-1 hover:text-white text-zinc-500 cursor-pointer"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                                <button onclick="deleteItem('${item.id}')" class="p-1 hover:text-rose-400 text-zinc-500 cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Update counter metric blocks dynamically
                document.getElementById('count-total').innerText = counts.total;
                document.getElementById('count-books').innerText = counts.books;
                document.getElementById('count-media').innerText = counts.media;
                document.getElementById('count-wishlist').innerText = counts.wishlist;

                lucide.createIcons();
            };
        }

        // Helper Utility Transformations
        function getIconName(type) {
            if (type === 'BOOK') return 'book-open';
            if (type === 'MOVIE') return 'clapperboard';
            if (type === 'MUSIC') return 'music';
            return 'gamepad-2';
        }

        function getStatusStyle(status) {
            if (status === 'OWNED') return 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20';
            if (status === 'LOANED') return 'bg-amber-500/10 text-amber-400 border border-amber-500/20';
            return 'bg-sky-500/10 text-sky-400 border border-sky-500/20';
        }

        function escapeHtml(str) {
            return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;") : '';
        }

        // CSV Import/Export Engineering Flow Elements
        function triggerCSVExport() {
            const tx = db.transaction("items", "readonly");
            const req = tx.objectStore("items").getAll();
            req.onsuccess = () => {
                const items = req.result;
                if (!items.length) return alert("The system database ledger is currently completely empty.");
                
                let csvContent = "data:text/csv;charset=utf-8,id,type,status,title,creator,identifier,notes\n";
                items.forEach(i => {
                    csvContent += `"${i.id}","${i.type}","${i.status}","${i.title.replace(/"/g, '""')}","${i.creator.replace(/"/g, '""')}","${(i.identifier || '').replace(/"/g, '""')}","${(i.notes || '').replace(/"/g, '""')}"\n`;
                });

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `omnishelf_backup_${Date.now()}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        function handleCSVImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const text = evt.target.result;
                const lines = text.split("\n").slice(1);
                const tx = db.transaction("items", "readwrite");
                const store = tx.objectStore("items");

                lines.forEach(line => {
                    const cleanLine = line.trim();
                    if (!cleanLine) return;
                    // Standard structural breakdown matching the column output bounds arrays
                    const parts = cleanLine.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!parts || parts.length < 5) return;

                    const clean = p => p ? p.replace(/^"|"$/g, '').replace(/""/g, '"') : '';
                    const item = {
                        id: clean(parts[0]) || crypto.randomUUID(),
                        type: clean(parts[1]),
                        status: clean(parts[2]),
                        title: clean(parts[3]),
                        creator: clean(parts[4]),
                        identifier: clean(parts[5]) || '',
                        notes: clean(parts[6]) || '',
                        timestamp: Date.now()
                    };
                    store.put(item);
                });

                tx.oncomplete = () => {
                    alert("System archive ledger parsing validation update finalized.");
                    renderItems();
                };
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
