<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>The Reading Room — Your Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root{
    --ink:#1B2A22;
    --ink-2:#223529;
    --paper:#F2EAD3;
    --paper-2:#E8DEC0;
    --brass:#B8862B;
    --brass-light:#D7AC55;
    --rust:#8A3B2E;
    --sage:#6E8F72;
    --ink-text:#241F16;
    --paper-text:#F4EEDB;
    --line: rgba(244,238,219,0.14);
    --line-dark: rgba(36,31,22,0.16);
    --shadow: 0 12px 30px rgba(0,0,0,0.28);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 700px at 15% -10%, #24392c 0%, transparent 60%),
      radial-gradient(1000px 600px at 110% 10%, #1f3226 0%, transparent 55%),
      var(--ink);
    color:var(--paper-text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  ::selection{ background:var(--brass); color:var(--ink); }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .app{ max-width:1100px; margin:0 auto; padding:28px 20px 80px; }
  button{ font-family:'Inter',sans-serif; cursor:pointer; }
  input, textarea{ font-family:'Inter',sans-serif; }

  /* ---------- Login / Card ---------- */
  .gate{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card-index{
    width:100%;
    max-width:400px;
    background:var(--paper);
    color:var(--ink-text);
    border-radius:4px;
    box-shadow:var(--shadow);
    position:relative;
    padding:40px 34px 34px;
    border-top:10px solid var(--rust);
  }
  .card-index::before{
    content:'';
    position:absolute;
    top:36px; left:0; right:0;
    height:1px;
    background:var(--line-dark);
  }
  .card-index .eyebrow{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--rust);
    font-weight:700;
    margin-bottom:6px;
  }
  .card-index h1{
    font-size:30px;
    margin:0 0 4px;
  }
  .card-index p.sub{
    font-family:'Spectral', serif;
    font-style:italic;
    color:#5b5546;
    margin:0 0 26px;
    font-size:15px;
  }
  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    font-weight:600;
    color:#6b6350;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:12px 14px;
    border:1.5px solid var(--line-dark);
    border-radius:3px;
    background:#fbf7ec;
    font-size:15px;
    color:var(--ink-text);
  }
  .field input:focus, textarea:focus, select:focus{
    outline:2px solid var(--brass);
    outline-offset:1px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:none;
    border-radius:3px;
    padding:12px 20px;
    font-weight:600;
    font-size:14px;
    transition:transform .15s ease, filter .15s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--rust); color:#F4EEDB; width:100%; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-ghost{ background:transparent; color:var(--paper-text); border:1.5px solid var(--line); }
  .btn-ghost:hover{ background:rgba(244,238,219,0.06); }
  .btn-brass{ background:var(--brass); color:#231b09; }
  .btn-brass:hover{ filter:brightness(1.08); }
  .gate-error{
    color:var(--rust);
    font-size:13px;
    margin:-8px 0 14px;
    font-weight:600;
  }
  .stamp{
    position:absolute;
    top:-18px; right:24px;
    width:64px; height:64px;
    border-radius:50%;
    border:3px solid var(--brass);
    display:flex; align-items:center; justify-content:center;
    background:var(--paper);
    color:var(--brass);
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:700;
    text-align:center;
    line-height:1.2;
    transform:rotate(-8deg);
  }

  /* ---------- Header / Tabs ---------- */
  .top{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:26px;
    flex-wrap:wrap;
    gap:16px;
  }
  .top .eyebrow{
    font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--brass-light); font-weight:700; margin-bottom:6px;
  }
  .top h1{ font-size:36px; margin:0; color:var(--paper-text); }
  .tabs{
    display:flex;
    gap:2px;
    border-bottom:1.5px solid var(--line);
    margin-bottom:28px;
    overflow-x:auto;
  }
  .tab{
    background:transparent;
    border:none;
    color:#a9b8ac;
    padding:12px 18px;
    font-size:14px;
    font-weight:600;
    border-bottom:3px solid transparent;
    white-space:nowrap;
    position:relative;
    top:1.5px;
  }
  .tab.active{ color:var(--paper-text); border-bottom-color:var(--brass); }
  .tab .count{
    display:inline-block;
    margin-left:6px;
    font-size:11px;
    background:rgba(244,238,219,0.1);
    padding:1px 7px;
    border-radius:20px;
    color:#cdd8cf;
  }
  .tab.active .count{ background:var(--brass); color:#231b09; }

  .searchbar{
    display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap;
  }
  .searchbar input{
    flex:1; min-width:180px;
    padding:11px 14px;
    border-radius:3px;
    border:1.5px solid var(--line);
    background:rgba(244,238,219,0.06);
    color:var(--paper-text);
    font-size:14px;
  }
  .searchbar input::placeholder{ color:#8fa192; }

  .empty{
    border:1.5px dashed var(--line);
    border-radius:6px;
    padding:50px 24px;
    text-align:center;
    color:#9fb0a1;
  }
  .empty .display{ color:var(--paper-text); font-size:22px; margin-bottom:8px;}
  .empty p{ font-family:'Spectral',serif; font-style:italic; font-size:15px; max-width:340px; margin:0 auto 18px;}

  /* ---------- Shelf (spines) ---------- */
  .shelf-group{ margin-bottom:36px; }
  .shelf-label{
    font-size:12px; text-transform:uppercase; letter-spacing:0.14em;
    color:#8fa192; font-weight:700; margin-bottom:10px;
  }
  .shelf{
    display:flex;
    align-items:flex-end;
    gap:3px;
    padding:0 0 14px;
    overflow-x:auto;
    position:relative;
  }
  .shelf::after{
    content:'';
    display:block;
    position:absolute;
    left:0; right:0; bottom:0;
    height:8px;
    background:linear-gradient(180deg, #3a2a1c, #241a11);
    border-radius:0 0 4px 4px;
    box-shadow: 0 6px 10px rgba(0,0,0,0.35);
  }
  .spine{
    flex:0 0 auto;
    width:34px;
    height:200px;
    border-radius:3px 3px 1px 1px;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding-top:14px;
    cursor:pointer;
    position:relative;
    box-shadow: inset -4px 0 8px rgba(0,0,0,0.18), 1px 0 0 rgba(255,255,255,0.06);
    transition:transform .15s ease;
  }
  .spine:hover{ transform:translateY(-8px); }
  .spine span{
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:12.5px;
    max-height:170px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:rgba(255,255,255,0.92);
    text-shadow: 0 1px 1px rgba(0,0,0,0.25);
  }
  .spine .badge{
    position:absolute;
    bottom:8px;
    width:20px; height:20px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.35);
    font-size:10px;
  }
  .spine-preview{
    position:absolute;
    bottom:calc(100% + 10px);
    left:50%;
    transform:translateX(-50%) translateY(6px);
    width:120px;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
    z-index:20;
    text-align:center;
  }
  .spine:hover .spine-preview{
    opacity:1;
    visibility:visible;
    transform:translateX(-50%) translateY(0);
  }
  .spine-preview img, .spine-preview .preview-fallback{
    width:120px;
    height:180px;
    border-radius:3px;
    box-shadow:0 14px 30px rgba(0,0,0,0.5);
    object-fit:cover;
    display:block;
  }
  .spine-preview .preview-fallback{
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Fraunces',serif; font-weight:700; font-size:34px;
  }
  .spine-preview .preview-title{
    margin-top:6px;
    font-size:11.5px;
    font-weight:600;
    color:var(--paper-text);
    background:rgba(20,28,22,0.9);
    padding:4px 7px;
    border-radius:3px;
    line-height:1.25;
  }
  .spine-preview::after{
    content:'';
    position:absolute;
    top:100%; left:50%;
    transform:translateX(-50%);
    border:6px solid transparent;
    border-top-color:rgba(20,28,22,0.9);
  }

  /* ---------- Reading cards ---------- */
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
  .book-card{
    background:var(--paper);
    color:var(--ink-text);
    border-radius:5px;
    padding:18px;
    box-shadow:var(--shadow);
    display:flex;
    gap:14px;
  }
  .cover{
    width:64px; height:96px;
    border-radius:2px;
    background:var(--paper-2);
    flex:0 0 auto;
    object-fit:cover;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);
  }
  .cover-fallback{
    width:64px; height:96px;
    border-radius:2px;
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-family:'Fraunces',serif; font-weight:700; font-size:20px;
    box-shadow:0 3px 8px rgba(0,0,0,0.25);
  }
  .book-card .info{ flex:1; min-width:0; }
  .book-card h3{ font-size:16px; margin:0 0 2px; line-height:1.25; }
  .book-card .author{ font-family:'Spectral',serif; font-style:italic; font-size:13px; color:#5b5546; margin-bottom:10px;}
  .progress-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .progress-track{
    flex:1; height:8px; background:var(--paper-2); border-radius:6px; overflow:hidden;
  }
  .progress-fill{ height:100%; background:var(--sage); border-radius:6px; transition:width .3s ease; }
  .progress-pct{ font-size:12px; font-weight:700; color:var(--sage); min-width:34px; text-align:right; }
  .page-input-row{ display:flex; align-items:center; gap:6px; font-size:12px; color:#6b6350; }
  .page-input-row input{
    width:56px; padding:5px 6px; border:1.5px solid var(--line-dark); border-radius:3px; font-size:13px; text-align:center;
  }
  .card-actions{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:3px; font-weight:600; }
  .btn-sm.rust{ background:var(--rust); color:#fbf3e6; border:none; }
  .btn-sm.line{ background:transparent; border:1.5px solid var(--line-dark); color:var(--ink-text); }
  .btn-sm.brass{ background:var(--brass); color:#231b09; border:none; }

  /* ---------- Finished list ---------- */
  .finished-card{
    background:var(--paper);
    color:var(--ink-text);
    border-radius:5px;
    padding:18px;
    box-shadow:var(--shadow);
  }
  .finished-top{ display:flex; gap:14px; margin-bottom:10px; }
  .stars{ display:flex; gap:3px; margin:6px 0 10px; }
  .star{ font-size:19px; cursor:pointer; color:var(--paper-2); transition:color .1s ease; user-select:none; }
  .star.filled{ color:var(--brass); }
  .notes-area{
    width:100%;
    min-height:70px;
    border:1.5px solid var(--line-dark);
    border-radius:3px;
    padding:10px 12px;
    font-family:'Spectral',serif;
    font-size:13.5px;
    color:var(--ink-text);
    background:#fbf7ec;
    resize:vertical;
  }
  .saved-tick{ font-size:11px; color:var(--sage); font-weight:700; height:14px; margin-top:4px; opacity:0; transition:opacity .2s; }
  .saved-tick.show{ opacity:1; }

  /* ---------- Floating add button ---------- */
  .fab{
    position:fixed;
    right:24px; bottom:24px;
    background:var(--brass);
    color:#231b09;
    border:none;
    border-radius:30px;
    padding:15px 22px;
    font-weight:700;
    font-size:14px;
    box-shadow:0 10px 24px rgba(0,0,0,0.4);
    display:flex; align-items:center; gap:8px;
    z-index:40;
  }
  .fab:hover{ filter:brightness(1.06); }

  /* ---------- Modal ---------- */
  .modal-bg{
    position:fixed; inset:0; background:rgba(10,14,10,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:20px;
  }
  .modal{
    background:var(--paper); color:var(--ink-text);
    width:100%; max-width:460px;
    border-radius:6px;
    box-shadow:var(--shadow);
    padding:26px;
    max-height:88vh;
    overflow-y:auto;
    position:relative;
  }
  .modal h2{ font-size:22px; margin:0 0 4px; }
  .modal .close{
    position:absolute; top:16px; right:16px;
    background:none; border:none; font-size:20px; color:#8a8266; padding:4px;
  }
  .modal-sub{ font-family:'Spectral',serif; font-style:italic; color:#5b5546; font-size:14px; margin:0 0 20px;}
  .scan-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 4/3;
    background:#000;
    border-radius:6px;
    overflow:hidden;
    margin-bottom:14px;
  }
  #scanner-video, #interactive video, #interactive canvas{
    position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover;
  }
  .scan-frame{
    position:absolute; inset:20%;
    border:2px solid var(--brass-light);
    border-radius:8px;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.35);
    pointer-events:none;
  }
  .divider-or{
    display:flex; align-items:center; gap:10px; margin:16px 0; color:#8a8266; font-size:12px; text-transform:uppercase; letter-spacing:0.1em;
  }
  .divider-or::before, .divider-or::after{ content:''; flex:1; height:1px; background:var(--line-dark); }
  .scan-status{ font-size:13px; color:#6b6350; margin-bottom:10px; min-height:18px; }
  .preview-book{ display:flex; gap:14px; padding:14px; background:var(--paper-2); border-radius:5px; margin-bottom:16px; }
  .preview-book h4{ margin:0 0 2px; font-size:15px; font-family:'Fraunces',serif; }
  .preview-book .author{ font-family:'Spectral',serif; font-style:italic; font-size:12.5px; color:#5b5546; }
  .status-choice{ display:flex; gap:8px; margin-top:14px; }
  .status-choice button{ flex:1; }

  select{
    width:100%; padding:11px 12px; border:1.5px solid var(--line-dark); border-radius:3px; background:#fbf7ec; font-size:14px; color:var(--ink-text);
  }

  @media (max-width: 560px){
    .top h1{ font-size:28px; }
    .card-index{ padding:32px 22px 26px; }
  }
</style>
</head>
<body>

<div id="app" class="app"></div>

<script>
/* ============================================================
   THE READING ROOM — personal book tracker
   ============================================================ */

const STORAGE_KEY_BOOKS = 'reading-room-books';

let books = [];
let currentTab = 'shelf';
let scannerActive = false;

const SPINE_COLORS = ['#8A3B2E','#6E8F72','#B8862B','#4B6455','#5C4A72','#A6572F','#2E5A6E','#7A4B3A'];

function spineColorFor(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) >>> 0; }
  return SPINE_COLORS[h % SPINE_COLORS.length];
}

/* ---------------- Storage helpers (plain localStorage — works on any real site) ---------------- */
async function loadBooks(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY_BOOKS);
    books = raw ? JSON.parse(raw) : [];
  }catch(e){ console.error('loadBooks failed', e); books = []; }
}
async function saveBooks(){
  try{
    localStorage.setItem(STORAGE_KEY_BOOKS, JSON.stringify(books));
  }catch(e){ console.error('Could not save library', e); }
}

/* ---------------- App shell ---------------- */
function renderApp(){
  const app = document.getElementById('app');
  const reading = books.filter(b=>b.status==='reading');
  const finished = books.filter(b=>b.status==='read');
  app.innerHTML = `
    <div class="top">
      <div>
        <div class="eyebrow">Private collection</div>
        <h1>Your Library</h1>
      </div>
    </div>
    <div class="tabs">
      <button class="tab ${currentTab==='shelf'?'active':''}" data-tab="shelf">The Shelf <span class="count">${books.length}</span></button>
      <button class="tab ${currentTab==='reading'?'active':''}" data-tab="reading">Now Reading <span class="count">${reading.length}</span></button>
      <button class="tab ${currentTab==='read'?'active':''}" data-tab="read">Finished <span class="count">${finished.length}</span></button>
    </div>
    <div id="tab-content"></div>
    <button class="fab" id="add-book-btn">+ &nbsp;Add a book</button>
  `;
  document.querySelectorAll('.tab').forEach(t=>{
    t.onclick = ()=>{ currentTab = t.dataset.tab; renderApp(); };
  });
  document.getElementById('add-book-btn').onclick = openAddModal;
  renderTabContent();
}

function renderTabContent(){
  const el = document.getElementById('tab-content');
  if(currentTab==='shelf') el.innerHTML = shelfHTML();
  else if(currentTab==='reading') el.innerHTML = readingHTML();
  else el.innerHTML = finishedHTML();
  wireTabEvents();
}

/* ---------------- Shelf view ---------------- */
function shelfHTML(){
  if(books.length===0){
    return `<div class="empty">
      <div class="display">The shelf is bare</div>
      <p>Scan the barcode on the back of a book, or search by ISBN, to start your collection.</p>
      <button class="btn btn-brass" onclick="openAddModal()">+ Add your first book</button>
    </div>`;
  }
  return `
    <div class="searchbar">
      <input id="shelf-search" placeholder="Search by title or author..." value="${shelfSearchTerm||''}">
    </div>
    <div id="shelf-books"></div>
  `;
}

let shelfSearchTerm = '';

function authorSortKey(authors){
  if(!authors) return 'zzzz'; // unknown authors sort last
  const first = authors.split(',')[0].trim();
  const parts = first.split(' ').filter(Boolean);
  const last = parts.length ? parts[parts.length-1] : first;
  return last.toLowerCase();
}

function sortBooksForShelf(list){
  return [...list].sort((a,b)=>{
    const authorCmp = authorSortKey(a.authors).localeCompare(authorSortKey(b.authors));
    if(authorCmp !== 0) return authorCmp;
    const seriesCmp = (a.seriesName||'').localeCompare(b.seriesName||'');
    if(seriesCmp !== 0) return seriesCmp;
    const aNum = (a.seriesNumber===null || a.seriesNumber===undefined || isNaN(a.seriesNumber)) ? Infinity : a.seriesNumber;
    const bNum = (b.seriesNumber===null || b.seriesNumber===undefined || isNaN(b.seriesNumber)) ? Infinity : b.seriesNumber;
    if(aNum !== bNum) return aNum - bNum;
    return a.title.localeCompare(b.title);
  });
}

function renderShelfBooks(){
  const container = document.getElementById('shelf-books');
  if(!container) return;
  const term = shelfSearchTerm.trim().toLowerCase();
  const filtered = books.filter(b => !term || b.title.toLowerCase().includes(term) || (b.authors||'').toLowerCase().includes(term));
  if(filtered.length===0){
    container.innerHTML = `<div class="empty"><p>No books match "${shelfSearchTerm}".</p></div>`;
    return;
  }
  // Group by genre, "Unsorted" always last, everything else alphabetical
  const groups = {};
  filtered.forEach(b=>{
    const g = b.genre && b.genre.trim() ? b.genre.trim() : 'Unsorted';
    if(!groups[g]) groups[g] = [];
    groups[g].push(b);
  });
  const genreNames = Object.keys(groups).sort((a,b)=>{
    if(a==='Unsorted') return 1;
    if(b==='Unsorted') return -1;
    return a.localeCompare(b);
  });

  container.innerHTML = genreNames.map(genre=>{
    const groupBooks = sortBooksForShelf(groups[genre]);
    return `
      <div class="shelf-group">
        <div class="shelf-label">${escapeHtml(genre)} — ${groupBooks.length} book${groupBooks.length!==1?'s':''}</div>
        <div class="shelf">
          ${groupBooks.map(b=>`
            <div class="spine" style="background:${spineColorFor(b.title)}" data-id="${b.id}">
              <div class="spine-preview">
                ${b.cover
                  ? `<img src="${b.cover}" alt="" onerror="this.outerHTML=previewFallbackHTML('${escapeAttr(b.title)}','${spineColorFor(b.title)}')">`
                  : previewFallbackHTML(escapeAttr(b.title), spineColorFor(b.title))}
                <div class="preview-title">${escapeHtml(b.title)}</div>
              </div>
              <span>${escapeHtml(b.title)}</span>
              <div class="badge">${statusIcon(b.status)}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');

  container.querySelectorAll('.spine').forEach(s=>{
    s.onclick = ()=> openBookDetail(s.dataset.id);
  });
}

function previewFallbackHTML(title, color){
  const initial = (title||'?').trim()[0] ? (title||'?').trim()[0].toUpperCase() : '?';
  return `<div class="preview-fallback" style="background:${color}">${initial}</div>`;
}

function statusIcon(status){
  if(status==='reading') return '📖';
  if(status==='read') return '✓';
  return '＋';
}

/* ---------------- Now Reading view ---------------- */
function readingHTML(){
  const list = books.filter(b=>b.status==='reading');
  if(list.length===0){
    return `<div class="empty">
      <div class="display">Nothing open right now</div>
      <p>Move a book from your shelf into "Now Reading" to start tracking your pages.</p>
    </div>`;
  }
  return `<div class="grid">
    ${list.map(b=>{
      const total = b.pageCount || 0;
      const cur = Math.min(b.currentPage||0, total||b.currentPage||0);
      const pct = total>0 ? Math.min(100, Math.round((cur/total)*100)) : 0;
      return `
      <div class="book-card" data-id="${b.id}">
        ${coverEl(b)}
        <div class="info">
          <h3>${escapeHtml(b.title)}</h3>
          <div class="author">${escapeHtml(b.authors||'Unknown author')}</div>
          <div class="progress-row">
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-pct">${pct}%</div>
          </div>
          <div class="page-input-row">
            <span>Page</span>
            <input type="number" min="0" max="${total||9999}" value="${cur}" class="page-input" data-id="${b.id}">
            <span>of</span>
            ${total ? `<strong>${total}</strong>` : `<input type="number" min="1" placeholder="?" class="total-input" data-id="${b.id}" style="width:56px;padding:5px 6px;border:1.5px solid var(--line-dark);border-radius:3px;font-size:13px;text-align:center;">`}
          </div>
          <div class="card-actions">
            <button class="btn-sm brass" data-finish="${b.id}">Mark finished</button>
            <button class="btn-sm line" data-toshelf="${b.id}">Back to shelf</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function coverEl(b){
  if(b.cover){
    return `<img class="cover" src="${b.cover}" alt="" onerror="this.outerHTML=fallbackCoverHTML('${escapeAttr(b.title)}','${spineColorFor(b.title)}')">`;
  }
  return fallbackCoverHTML(escapeAttr(b.title), spineColorFor(b.title));
}
function fallbackCoverHTML(title, color){
  const initial = (title||'?').trim()[0] ? (title||'?').trim()[0].toUpperCase() : '?';
  return `<div class="cover-fallback" style="background:${color}">${initial}</div>`;
}

/* ---------------- Finished view ---------------- */
function finishedHTML(){
  const list = books.filter(b=>b.status==='read').sort((a,b)=> (b.dateFinished||'').localeCompare(a.dateFinished||''));
  if(list.length===0){
    return `<div class="empty">
      <div class="display">No finished books yet</div>
      <p>When you finish a book from "Now Reading," it lands here for a rating and your notes.</p>
    </div>`;
  }
  return `<div class="grid">
    ${list.map(b=>`
      <div class="finished-card" data-id="${b.id}">
        <div class="finished-top">
          ${coverEl(b)}
          <div class="info">
            <h3>${escapeHtml(b.title)}</h3>
            <div class="author">${escapeHtml(b.authors||'Unknown author')}</div>
          </div>
        </div>
        <div class="stars" data-id="${b.id}">
          ${[1,2,3,4,5].map(n=>`<span class="star ${n<=(b.rating||0)?'filled':''}" data-n="${n}" data-id="${b.id}">★</span>`).join('')}
        </div>
        <textarea class="notes-area" data-id="${b.id}" placeholder="What did you think? Favorite lines, feelings, who to recommend it to...">${escapeHtml(b.notes||'')}</textarea>
        <div class="saved-tick" id="tick-${b.id}">Saved</div>
        <div class="card-actions">
          <button class="btn-sm line" data-toshelf="${b.id}">Move back to shelf</button>
        </div>
      </div>
    `).join('')}
  </div>`;
}

function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str).replace(/'/g, "&#39;"); }

/* ---------------- Wiring per-tab interactive events ---------------- */
function wireTabEvents(){
  if(currentTab==='shelf'){
    renderShelfBooks();
    const search = document.getElementById('shelf-search');
    if(search){
      search.oninput = (e)=>{ shelfSearchTerm = e.target.value; renderShelfBooks(); };
      search.focus();
      search.selectionStart = search.selectionEnd = search.value.length;
    }
  }
  if(currentTab==='reading'){
    document.querySelectorAll('.page-input').forEach(inp=>{
      inp.addEventListener('change', async ()=>{
        const b = books.find(x=>x.id===inp.dataset.id);
        if(!b) return;
        b.currentPage = parseInt(inp.value)||0;
        await saveBooks();
        renderTabContent();
      });
    });
    document.querySelectorAll('.total-input').forEach(inp=>{
      inp.addEventListener('change', async ()=>{
        const b = books.find(x=>x.id===inp.dataset.id);
        if(!b) return;
        b.pageCount = parseInt(inp.value)||0;
        await saveBooks();
        renderTabContent();
      });
    });
    document.querySelectorAll('[data-finish]').forEach(btn=>{
      btn.onclick = async ()=>{
        const b = books.find(x=>x.id===btn.dataset.finish);
        if(!b) return;
        b.status = 'read';
        b.dateFinished = new Date().toISOString();
        if(b.pageCount) b.currentPage = b.pageCount;
        await saveBooks();
        currentTab = 'read';
        renderApp();
      };
    });
    document.querySelectorAll('[data-toshelf]').forEach(btn=>{
      btn.onclick = async ()=>{
        const b = books.find(x=>x.id===(btn.dataset.toshelf));
        if(!b) return;
        b.status = 'to-read';
        await saveBooks();
        renderTabContent();
      };
    });
  }
  if(currentTab==='read'){
    document.querySelectorAll('.star').forEach(s=>{
      s.onclick = async ()=>{
        const b = books.find(x=>x.id===s.dataset.id);
        if(!b) return;
        b.rating = parseInt(s.dataset.n);
        await saveBooks();
        renderTabContent();
      };
    });
    document.querySelectorAll('.notes-area').forEach(ta=>{
      let t;
      ta.addEventListener('input', ()=>{
        clearTimeout(t);
        t = setTimeout(async ()=>{
          const b = books.find(x=>x.id===ta.dataset.id);
          if(!b) return;
          b.notes = ta.value;
          await saveBooks();
          const tick = document.getElementById('tick-'+b.id);
          if(tick){ tick.classList.add('show'); setTimeout(()=>tick.classList.remove('show'), 1400); }
        }, 500);
      });
    });
    document.querySelectorAll('[data-toshelf]').forEach(btn=>{
      btn.onclick = async ()=>{
        const b = books.find(x=>x.id===(btn.dataset.toshelf));
        if(!b) return;
        b.status = 'to-read';
        await saveBooks();
        renderTabContent();
      };
    });
  }
}

/* ---------------- Book detail (from shelf) ---------------- */
function openBookDetail(id){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  const modalRoot = document.createElement('div');
  modalRoot.className = 'modal-bg';
  modalRoot.innerHTML = `
    <div class="modal">
      <button class="close" id="detail-close">&times;</button>
      <div style="display:flex; gap:16px; margin-bottom:14px;">
        ${coverEl(b)}
        <div>
          <h2>${escapeHtml(b.title)}</h2>
          <div style="font-size:12px; color:#8a8266;">ISBN ${escapeHtml(b.isbn||'—')}${b.pageCount? ' · '+b.pageCount+' pages':''}</div>
        </div>
      </div>
      <div class="field">
        <label>Author</label>
        <input id="field-author" value="${escapeAttr(b.authors||'')}" placeholder="Author name">
      </div>
      ${detailFieldsHTML(b.genre==='Unsorted'?'':(b.genre||''), b.seriesName||'', b.seriesNumber||'')}
      <div class="field">
        <label>Shelf status</label>
        <select id="status-select">
          <option value="to-read" ${b.status==='to-read'?'selected':''}>On the shelf</option>
          <option value="reading" ${b.status==='reading'?'selected':''}>Now reading</option>
          <option value="read" ${b.status==='read'?'selected':''}>Finished</option>
        </select>
      </div>
      <button class="btn btn-primary" id="detail-save">Save</button>
      <button class="btn btn-ghost" id="detail-remove" style="width:100%; margin-top:8px; border-color:var(--line-dark); color:var(--rust);">Remove from library</button>
    </div>
  `;
  document.body.appendChild(modalRoot);
  modalRoot.addEventListener('click', (e)=>{ if(e.target===modalRoot) modalRoot.remove(); });
  document.getElementById('detail-close').onclick = ()=> modalRoot.remove();
  document.getElementById('detail-save').onclick = async ()=>{
    const newStatus = document.getElementById('status-select').value;
    b.status = newStatus;
    b.authors = document.getElementById('field-author').value.trim();
    b.genre = document.getElementById('field-genre').value.trim() || 'Unsorted';
    b.seriesName = document.getElementById('field-series-name').value.trim();
    const num = document.getElementById('field-series-number').value.trim();
    b.seriesNumber = num ? parseFloat(num) : null;
    if(newStatus==='read' && !b.dateFinished) b.dateFinished = new Date().toISOString();
    await saveBooks();
    modalRoot.remove();
    renderApp();
  };
  document.getElementById('detail-remove').onclick = async ()=>{
    if(!confirm(`Remove "${b.title}" from your library?`)) return;
    books = books.filter(x=>x.id!==id);
    await saveBooks();
    modalRoot.remove();
    renderApp();
  };
}

/* ---------------- Add book modal + scanning ---------------- */
function openAddModal(){
  const modalRoot = document.createElement('div');
  modalRoot.className = 'modal-bg';
  modalRoot.id = 'add-modal-bg';
  modalRoot.innerHTML = `
    <div class="modal">
      <button class="close" id="add-close">&times;</button>
      <h2>Add a book</h2>
      <p class="modal-sub">Scan a barcode or type the ISBN yourself.</p>
      <div id="scan-status" class="scan-status">Starting camera…</div>
      <div class="scan-wrap" id="scan-wrap">
        <div id="interactive" class="viewport" style="position:absolute; inset:0;"></div>
        <div class="scan-frame"></div>
      </div>
      <div class="divider-or">or</div>
      <div class="field" style="margin-bottom:10px;">
        <label>Enter ISBN manually</label>
        <input id="manual-isbn" placeholder="e.g. 9780143127550">
      </div>
      <button class="btn btn-ghost" id="manual-lookup-btn" style="width:100%;">Look up this ISBN</button>
      <div id="add-result"></div>
    </div>
  `;
  document.body.appendChild(modalRoot);
  document.getElementById('add-close').onclick = ()=>{ stopScanner(); modalRoot.remove(); };
  modalRoot.addEventListener('click', (e)=>{ if(e.target===modalRoot){ stopScanner(); modalRoot.remove(); } });
  document.getElementById('manual-lookup-btn').onclick = ()=>{
    const val = document.getElementById('manual-isbn').value.replace(/[^0-9Xx]/g,'');
    if(val.length < 8){ alert('Please enter a valid ISBN (10 or 13 digits).'); return; }
    handleIsbnFound(val);
  };
  startScanner();
}

function startScanner(){
  const statusEl = document.getElementById('scan-status');
  if(typeof Quagga === 'undefined'){
    statusEl.textContent = 'Camera scanning isn\'t available — please enter the ISBN below.';
    document.getElementById('scan-wrap').style.display = 'none';
    return;
  }
  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: document.querySelector('#interactive'),
      constraints: { facingMode: 'environment' }
    },
    decoder: { readers: ['ean_reader'] },
    locate: true
  }, function(err){
    if(err){
      console.error(err);
      statusEl.textContent = 'Could not access your camera — please enter the ISBN below.';
      document.getElementById('scan-wrap').style.display = 'none';
      return;
    }
    Quagga.start();
    scannerActive = true;
    statusEl.textContent = 'Point your camera at the barcode on the back of the book.';
  });
  Quagga.onDetected(onBarcodeDetected);
}

let lastDetected = null;
function onBarcodeDetected(result){
  const code = result?.codeResult?.code;
  if(!code || code === lastDetected) return;
  if(code.length !== 13 || !(code.startsWith('978') || code.startsWith('979'))) return; // ISBN-13 prefixes
  lastDetected = code;
  const statusEl = document.getElementById('scan-status');
  if(statusEl) statusEl.textContent = 'Found it! Looking up book details…';
  stopScanner();
  handleIsbnFound(code);
}

function stopScanner(){
  if(scannerActive && typeof Quagga !== 'undefined'){
    try{ Quagga.offDetected(onBarcodeDetected); Quagga.stop(); }catch(e){}
  }
  scannerActive = false;
  lastDetected = null;
}

async function handleIsbnFound(isbn){
  const resultEl = document.getElementById('add-result');
  resultEl.innerHTML = `<p style="font-family:'Spectral',serif; font-style:italic; color:#5b5546;">Looking up ISBN ${isbn}...</p>`;
  const data = await fetchBookData(isbn);
  if(!data){
    resultEl.innerHTML = `
      <div class="preview-book">
        <div class="cover-fallback" style="background:${spineColorFor(isbn)}">?</div>
        <div>
          <h4>Couldn't find this one automatically</h4>
          <div class="author">ISBN ${isbn}</div>
        </div>
      </div>
      <div class="field"><label>Title</label><input id="manual-title" placeholder="Enter title"></div>
      <div class="field"><label>Author</label><input id="manual-author" placeholder="Enter author"></div>
      ${detailFieldsHTML('', '', '')}
      <button class="btn btn-brass" id="confirm-manual-add" style="width:100%;">Add to my shelf</button>
    `;
    document.getElementById('confirm-manual-add').onclick = ()=>{
      const title = document.getElementById('manual-title').value.trim() || 'Untitled';
      const authors = document.getElementById('manual-author').value.trim();
      confirmAddBook({
        isbn, title, authors, cover:null, pageCount:null,
        genre: document.getElementById('field-genre').value.trim(),
        seriesName: document.getElementById('field-series-name').value.trim(),
        seriesNumber: document.getElementById('field-series-number').value.trim()
      });
    };
    return;
  }
  resultEl.innerHTML = `
    <div class="preview-book">
      ${data.cover ? `<img src="${data.cover}" class="cover" style="width:56px;height:84px;" onerror="this.style.display='none'">` : `<div class="cover-fallback" style="background:${spineColorFor(data.title)};width:56px;height:84px;">${data.title[0]}</div>`}
      <div>
        <h4>${escapeHtml(data.title)}</h4>
        <div class="author">${escapeHtml(data.authors||'Unknown author')}</div>
        ${data.pageCount ? `<div style="font-size:12px;color:#8a8266;">${data.pageCount} pages</div>` : ''}
      </div>
    </div>
    ${detailFieldsHTML(data.genre||'', '', '')}
    <button class="btn btn-brass" id="confirm-add" style="width:100%;">Add to my shelf</button>
  `;
  document.getElementById('confirm-add').onclick = ()=> confirmAddBook({
    ...data,
    genre: document.getElementById('field-genre').value.trim(),
    seriesName: document.getElementById('field-series-name').value.trim(),
    seriesNumber: document.getElementById('field-series-number').value.trim()
  });
}

// Shared markup for genre + series inputs, used both at add-time and in the edit modal
function detailFieldsHTML(genre, seriesName, seriesNumber){
  return `
    <div class="field">
      <label>Genre / shelf</label>
      <input id="field-genre" placeholder="e.g. Fantasy, Biography, Mystery" value="${escapeAttr(genre)}">
    </div>
    <div style="display:flex; gap:10px;">
      <div class="field" style="flex:2;">
        <label>Series name (optional)</label>
        <input id="field-series-name" placeholder="e.g. The Expanse" value="${escapeAttr(seriesName)}">
      </div>
      <div class="field" style="flex:1;">
        <label>Book #</label>
        <input id="field-series-number" type="number" min="0" step="0.5" placeholder="1" value="${escapeAttr(String(seriesNumber||''))}">
      </div>
    </div>
  `;
}

async function fetchOpenLibraryData(isbn){
  try{
    const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&jscmd=data&format=json`);
    const json = await res.json();
    const key = `ISBN:${isbn}`;
    if(!json[key]) return null;
    const d = json[key];
    const rawSubject = (d.subjects && d.subjects[0]) ? d.subjects[0].name : null;
    return {
      title: d.title || null,
      authors: (d.authors||[]).map(a=>a.name).join(', ') || null,
      cover: d.cover ? (d.cover.medium || d.cover.large || d.cover.small) : null,
      pageCount: d.number_of_pages || null,
      genre: cleanGenre(rawSubject)
    };
  }catch(e){
    console.error('Open Library lookup failed', e);
    return null;
  }
}

async function fetchGoogleBooksData(isbn){
  try{
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    const json = await res.json();
    const item = json.items && json.items[0];
    if(!item) return null;
    const info = item.volumeInfo || {};
    const rawCategory = (info.categories && info.categories[0]) ? info.categories[0] : null;
    return {
      title: info.title || null,
      authors: (info.authors||[]).join(', ') || null,
      cover: info.imageLinks ? (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail || null) : null,
      pageCount: info.pageCount || null,
      genre: cleanGenre(rawCategory)
    };
  }catch(e){
    console.error('Google Books lookup failed', e);
    return null;
  }
}

// Google/Open Library categories often look like "Fiction / Fantasy / General" — take the most specific useful segment.
function cleanGenre(raw){
  if(!raw) return null;
  const parts = raw.split('/').map(s=>s.trim()).filter(Boolean);
  if(parts.length===0) return null;
  // Prefer the last segment unless it's a filler word like "General"
  let pick = parts[parts.length-1];
  if(/^general$/i.test(pick) && parts.length>1) pick = parts[parts.length-2];
  return pick;
}

async function fetchBookData(isbn){
  // Query both sources in parallel, then merge — filling gaps in one with the other.
  const [ol, gb] = await Promise.all([
    fetchOpenLibraryData(isbn),
    fetchGoogleBooksData(isbn)
  ]);
  if(!ol && !gb) return null;
  const merged = {
    isbn,
    title: (ol && ol.title) || (gb && gb.title) || 'Untitled',
    authors: (ol && ol.authors) || (gb && gb.authors) || '',
    // Prefer Open Library's cover convention (consistent sizing), fall back to Google's thumbnail
    cover: (ol && ol.cover) || (gb && gb.cover) || `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`,
    pageCount: (ol && ol.pageCount) || (gb && gb.pageCount) || null,
    genre: (gb && gb.genre) || (ol && ol.genre) || ''
  };
  return merged;
}

async function confirmAddBook(data){
  const newBook = {
    id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())+Math.random()),
    isbn: data.isbn,
    title: data.title,
    authors: data.authors,
    cover: data.cover,
    pageCount: data.pageCount,
    genre: (data.genre||'').trim() || 'Unsorted',
    seriesName: (data.seriesName||'').trim(),
    seriesNumber: data.seriesNumber ? parseFloat(data.seriesNumber) : null,
    status: 'to-read',
    currentPage: 0,
    rating: 0,
    notes: '',
    dateAdded: new Date().toISOString(),
    dateFinished: null
  };
  books.push(newBook);
  await saveBooks();
  document.getElementById('add-modal-bg')?.remove();
  currentTab = 'shelf';
  renderApp();
}

/* ---------------- Boot ---------------- */
(async function boot(){
  await loadBooks();
  renderApp();
})();
</script>
